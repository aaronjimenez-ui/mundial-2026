<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mundial 2026 ⚽ Predicciones</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <style>
    :root {
      --navy: #1B2A4A; --navy-lt: #243556; --navy-md: #2D4168;
      --sf: #0F1923; --s1: #162230; --s2: #1C2D3F; --s3: #23374D;
      --bd: #2A3F5A; --blue: #4A90D9; --blue-lt: #6BA5E7;
      --green: #34C77B; --gold: #D4A853; --gold-lt: #F0C96A;
      --coral: #F2735A; --red: #E85454; --orange: #F2A03D;
      --silver: #9BAFC8; --bronze: #C87D3A;
      --tx: #E8EDF3; --t2: #9BAFC8; --t3: #6B82A0;
      --mono: 'JetBrains Mono', monospace;
      --sans: 'DM Sans', system-ui, sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--sans); background: var(--sf); color: var(--tx); min-height: 100vh;
      background-image: radial-gradient(circle at 20% 50%, rgba(74,144,217,0.04) 0%, transparent 50%),
                        radial-gradient(circle at 80% 20%, rgba(212,168,83,0.04) 0%, transparent 40%);
    }
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: var(--s1); }
    ::-webkit-scrollbar-thumb { background: var(--bd); border-radius: 4px; }

    /* ── Tab bar ── */
    .tab-btn {
      padding: 14px 18px; border-bottom: 3px solid transparent;
      color: var(--t3); font-weight: 600; font-size: 13px; cursor: pointer;
      transition: all 0.2s; white-space: nowrap; background: none;
      border-top: none; border-left: none; border-right: none; letter-spacing: 0.2px;
    }
    .tab-btn.active { border-bottom-color: var(--blue); color: var(--blue); }
    .tab-btn:hover:not(.active) { color: var(--t2); background: rgba(255,255,255,0.03); }
    .tab-bar { background: var(--s1); border-bottom: 1px solid var(--bd); position: sticky; top: 0; z-index: 40; overflow-x: auto; }
    .tab-bar::-webkit-scrollbar { display: none; }

    /* ── Cards ── */
    .card {
      background: var(--s2); border: 1px solid var(--bd);
      border-radius: 16px; padding: 18px; margin-bottom: 10px;
      transition: transform 0.15s, border-color 0.2s;
    }
    .card:hover { transform: translateY(-1px); border-color: var(--navy-md); }
    .card-sm { padding: 13px 16px; }

    /* ── Pills / filters ── */
    .pill {
      padding: 6px 14px; border-radius: 20px; font-size: 12px; font-weight: 600;
      cursor: pointer; white-space: nowrap; border: 1px solid var(--bd);
      background: var(--s2); color: var(--t2); transition: all 0.15s; letter-spacing: 0.1px;
    }
    .pill.active { background: var(--blue); border-color: var(--blue); color: white; box-shadow: 0 0 12px rgba(74,144,217,0.3); }
    .pill:hover:not(.active) { border-color: var(--t3); color: var(--tx); }
    .pill-sm { padding: 5px 11px; font-size: 11px; }
    .hscroll { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 2px; -webkit-overflow-scrolling: touch; }
    .hscroll::-webkit-scrollbar { display: none; }

    /* ── Date section header ── */

      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 2px 8px; margin-top: 6px;
    }
    .date-header-label {
      font-size: 13px; font-weight: 800; color: var(--t2);
      text-transform: uppercase; letter-spacing: 0.6px;
    }
    .date-header-count {
      font-size: 11px; color: var(--t3); font-weight: 600;
    }

    /* ── Score inputs ── */
    .score-box {
      width: 52px; height: 52px; background: var(--s3); border: 2px solid var(--bd);
      border-radius: 12px; text-align: center; font-size: 20px; font-weight: 700;
      font-family: var(--mono); color: var(--tx);

    .btn-primary { background: var(--blue); color: white; padding: 10px 18px; }
    .btn-primary:hover:not(:disabled) { background: var(--blue-lt); transform: translateY(-1px); }
    .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
    .btn-sm { padding: 8px 13px; font-size: 12px; border-radius: 8px; }
    .btn-ghost { background: var(--s3); color: var(--t2); padding: 8px 14px; border: 1px solid var(--bd); }
    .btn-ghost:hover { background: var(--navy-md); color: var(--tx); }

    .badge-miss  { background: rgba(232,84,84,0.1); color: var(--red); border: 1px solid rgba(232,84,84,0.2); }
    .badge-none  { background: var(--s3); color: var(--t3); border: 1px solid var(--bd); }
    .badge-saved { background: rgba(52,199,123,0.1); color: var(--green); border: 1px solid rgba(52,199,123,0.2); }
    .badge-group { background: rgba(74,144,217,0.12); color: var(--blue-lt); border: 1px solid rgba(74,144,217,0.25); font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; }
    .badge-done  { background: rgba(52,199,123,0.08); color: var(--green); border: 1px solid rgba(52,199,123,0.15); font-size: 10px; text-transform: uppercase; letter-spacing: 0.6px; }
    .badge-lock  { background: rgba(242,115,90,0.12); color: var(--coral); border: 1px solid rgba(242,115,90,0.3); }
    .badge-live  { background: rgba(52,199,123,0.15); color: var(--green); border: 1px solid rgba(52,199,123,0.35); animation: pulse 1.5s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.7} }

    /* ── Score display (finished) ── */

      font-family: var(--mono); font-size: 26px; font-weight: 700; color: var(--tx);
      background: var(--s3); border: 1px solid var(--bd);

    .team-block { display: flex; flex-direction: column; align-items: center; gap: 5px; flex: 1; min-width: 0; }
    .team-flag  { display: flex; justify-content: center; align-items: center; height: 36px; }
    .team-flag img { border-radius: 4px; object-fit: cover; box-shadow: 0 1px 4px rgba(0,0,0,0.3); }
    .team-name  { font-size: 11px; font-weight: 700; color: var(--t2); text-align: center;

    /* ── Leaderboard ── */
    .ldr-1 { background: linear-gradient(135deg, rgba(212,168,83,0.12), rgba(212,168,83,0.05)); border-color: rgba(212,168,83,0.35) !important; }

    .ldr-me { border-color: rgba(74,144,217,0.5) !important; box-shadow: 0 0 0 1px rgba(74,144,217,0.15); }

    /* ── Inputs ── */
    .input { width: 100%; background: var(--s3); border: 1px solid var(--bd); border-radius: 10px; padding: 11px 14px; font-size: 14px; color: var(--tx); font-family: var(--sans); transition: border-color 0.2s; }

    .input::placeholder { color: var(--t3); }
    select.input { cursor: pointer; }
    label { display: block; font-size: 12px; font-weight: 700; color: var(--t2); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }

    /* ── Modal ── */
    .modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.75); display: flex; align-items: center; justify-content: center; z-index: 100; padding: 16px; backdrop-filter: blur(4px); }

    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner { width: 28px; height: 28px; border: 3px solid var(--s3); border-top-color: var(--blue); border-radius: 50%; animation: spin 0.7s linear infinite; margin: 56px auto; }

    #toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: var(--navy); border: 1px solid var(--bd); color: var(--tx); padding: 10px 20px; border-radius: 12px; font-size: 13px; font-weight: 600; opacity: 0; transition: opacity 0.25s; z-index: 999; pointer-events: none; white-space: nowrap; box-shadow: 0 8px 32px rgba(0,0,0,0.4); }

</head>

/* ── Tournament weeks (CLT dates) ── */

const flag = (t, size = 48) => {

  if (!code) return `<span style="font-size:${Math.round(size * 0.6)}px;line-height:1;">🏴</span>`;

/* ── Utils ── */
function cltDate(dt) {
  /* Returns 'YYYY-MM-DD' in CLT (UTC-4) */
  const d = new Date(new Date(dt).getTime() - 4 * 3600000);
  return d.toISOString().split('T')[0];
}

function fmtTime(dt) {
  const d = new Date(new Date(dt).getTime() - 4 * 3600000);
  const h = String(d.getUTCHours()).padStart(2,'0');
  const m = String(d.getUTCMinutes()).padStart(2,'0');
  return `${h}:${m}`;
}

function fmtDateHeader(dateStr) {
  const [y, mo, day] = dateStr.split('-').map(Number);
  const DAYS   = ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
  const MONTHS = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
  const dow = new Date(y, mo - 1, day).getDay();
  return `${DAYS[dow]} ${day} ${MONTHS[mo-1]}`;
}

function getLock(m) {
  if (m.is_finished) return { locked: true, type: 'finished', label: 'Finalizado' };
  const diff = new Date(m.match_date) - Date.now();
  if (diff <= 0)        return { locked: true, type: 'live',    label: 'En curso'     };
  if (diff <= 3600000)  return { locked: true, type: 'closing', label: 'Cierra pronto'};
  const mins = Math.floor(diff / 60000);
  const hrs  = Math.floor(mins / 60);
  const days = Math.floor(hrs  / 24);
  if (days > 0) return { locked: false, type: 'open', label: `${days}d ${hrs%24}h` };
  return { locked: false, type: 'open', label: `${hrs}h ${mins%60}m` };
}

function calcPoints(pH, pA, rH, rA) {
  if (pH === rH && pA === rA) return 3;
  if (Math.sign(pH - pA) === Math.sign(rH - rA)) return 1;
  return 0;
}

let _tt;
function toast(msg, ms = 2800) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.style.opacity = '1';
  clearTimeout(_tt);
  _tt = setTimeout(() => { el.style.opacity = '0'; }, ms);
}

function getDefaultWeek() {
  const today = cltDate(new Date().toISOString());
  if (today >= WEEKS[2].start) return 3;
  if (today >= WEEKS[1].start) return 2;
  return 1;
}

/* ── Auth ── */
function login() {
  const name = (document.getElementById('nameInput').value || '').trim();
  if (!name || name.length < 2) { toast('⚠ Escribe tu nombre (mínimo 2 letras)'); return; }
  currentUser = name;
  localStorage.setItem('mundial_user', name);
  document.getElementById('loginModal').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  bootApp();
}
function logout() {
  if (!confirm('¿Salir? Tus apuestas quedan guardadas.')) return;
  localStorage.removeItem('mundial_user');
  location.reload();
}

/* ── Data ── */
async function loadAll() {
  await Promise.all([loadMatches(), loadUserPreds()]);
  await loadLeaderboard();
}

async function loadMatches() {
  const { data } = await sb.from('mundial_matches').select('*').order('match_date', { ascending: true });
  matches = data || [];
}

async function loadUserPreds() {
  const { data } = await sb.from('mundial_predictions').select('*').eq('player_name', currentUser);
  userPreds = {};
  (data || []).forEach(p => { userPreds[p.match_id] = p; });
}

async function loadLeaderboard() {
  const { data } = await sb.from('mundial_predictions').select('player_name, points');
  const board = {};
  (data || []).forEach(p => {
    if (!board[p.player_name]) board[p.player_name] = { name: p.player_name, total: 0 };
    board[p.player_name].total += (p.points || 0);
  });
  leaderboard = Object.values(board).sort((a, b) => b.total - a.total);
  updateHeaderPts();
}

function updateHeaderPts() {
  const me = leaderboard.find(p => p.name === currentUser);
  const pts = me ? me.total : 0;
  document.getElementById('hdrPts').textContent = `${pts} ${pts === 1 ? 'PUNTO' : 'PUNTOS'}`;
}

/* ── Navigation ── */
function switchTab(tab) {
  activeTab = tab;
  ['matches','leaderboard','admin'].forEach(t => {
    document.getElementById(`tabBtn-${t}`).classList.toggle('active', t === tab);
    const pane = document.getElementById(`pane-${t}`);
    pane.style.display = t === tab ? 'block' : 'none';
    if (t === tab) pane.classList.add('fade-in');
  });
  render();
}
function render() {
  if (activeTab === 'matches')     renderMatches();
  if (activeTab === 'leaderboard') renderLeaderboard();
  if (activeTab === 'admin')       renderAdmin();
}

/* ── MATCHES ── */
function setWeek(w)  { activeWeek = w;  renderMatches(); }
function setGroup(g) { activeGroup = g; renderMatches(); }

function getFilteredMatches() {
  const week = WEEKS.find(w => w.id === activeWeek);
  let list = week
    ? matches.filter(m => { const d = cltDate(m.match_date); return d >= week.start && d < week.end; })
    : matches;
  if (activeGroup !== 'Todos') list = list.filter(m => m.group_name === activeGroup);
  return list;
}

function renderMatches() {
  const pane = document.getElementById('pane-matches');
  if (!pane) return;

  /* ── Week selector ── */
  let html = `<div style="margin-bottom:10px;">
    <div class="hscroll" style="margin-bottom:8px;">
      ${WEEKS.map(w => `
        <button class="pill${activeWeek===w.id?' active':''}" onclick="setWeek(${w.id})" style="display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 14px;">
          <span style="font-size:12px;">${w.label}</span>
          <span style="font-size:10px;opacity:0.7;font-weight:500;">${w.dates}</span>
        </button>`).join('')}
    </div>`;

  /* ── Group filter ── */
  const groups = ['Todos', ...new Set(matches.filter(m=>m.group_name).map(m=>m.group_name).sort())];
  html += `<div class="hscroll">
    ${groups.map(g => {
      const short = g === 'Todos' ? 'Todos' : g.replace('Grupo ', '');
      return `<button class="pill pill-sm${activeGroup===g?' active':''}" onclick="setGroup('${g}')">${short}</button>`;
    }).join('')}
  </div></div>`;

  const filtered = getFilteredMatches();

  if (matches.length === 0) {
    html += `<div class="empty-state"><div class="icon">🏟️</div><div class="title">Sin partidos</div><div class="sub">El Admin puede cargarlos en la pestaña Admin</div></div>`;
    pane.innerHTML = html; return;
  }
  if (filtered.length === 0) {
    html += `<div class="empty-state"><div class="icon">🔍</div><div class="title">Sin partidos</div><div class="sub">No hay partidos para este filtro</div></div>`;
    pane.innerHTML = html; return;
  }

  /* ── Pending alert ── */
  const pending = filtered.filter(m => !m.is_finished && !getLock(m).locked && !userPreds[m.id]).length;
  if (pending > 0) {
    html += `<div class="alert-banner">
      <span>⚡</span>
      <span>Tienes <strong>${pending}</strong> partido${pending > 1?'s':''} sin apostar esta semana</span>
    </div>`;
  }

  /* ── Group by CLT date ── */
  const byDate = {};
  filtered.forEach(m => {
    const d = cltDate(m.match_date);
    if (!byDate[d]) byDate[d] = [];
    byDate[d].push(m);
  });

  Object.keys(byDate).sort().forEach(dateStr => {
    const dayMatches = byDate[dateStr];
    html += `<div class="date-header">
      <span class="date-header-label">${fmtDateHeader(dateStr)}</span>
      <span class="date-header-count">${dayMatches.length} partido${dayMatches.length>1?'s':''}</span>
    </div>`;
    dayMatches.forEach(m => { html += buildMatchCard(m); });
  });

  pane.innerHTML = html;
}

function buildMatchCard(m) {
  const pred  = userPreds[m.id];
  const lock  = getLock(m);
  const hasPred = !!pred;

  /* ── Lock badge ── */
  let lockBadge = '';
  if (lock.type === 'finished') {
    lockBadge = `<span class="badge badge-done">Finalizado</span>`;
  } else if (lock.type === 'live') {
    lockBadge = `<span class="badge badge-live">En curso</span>`;
  } else if (lock.type === 'closing') {
    lockBadge = `<span class="badge badge-lock">🔒 Cierra pronto</span>`;
  } else {
    lockBadge = `<span style="font-size:11px;color:var(--t3);">⏰ ${lock.label}</span>`;
  }

  /* ── Prediction badge ── */
  let predBadge = '';
  if (m.is_finished && hasPred) {
    const p = pred.points || 0;
    if (p === 3)      predBadge = `<span class="badge badge-exact">Exacto +3</span>`;
    else if (p === 1) predBadge = `<span class="badge badge-win">Ganador +1</span>`;
    else              predBadge = `<span class="badge badge-miss">Falló</span>`;
  } else if (m.is_finished) {
    predBadge = `<span class="badge badge-miss">Sin apuesta</span>`;
  } else if (hasPred) {
    predBadge = `<span class="badge badge-saved">✓ Apostado</span>`;
  }

  /* ── Center: score or VS ── */
  const center = m.is_finished
    ? `<div class="score-display">${m.home_score}<span style="color:var(--t3);margin:0 4px;font-size:18px;">:</span>${m.away_score}</div>`
    : `<div style="display:flex;flex-direction:column;align-items:center;gap:4px;">
         <div style="font-size:10px;font-weight:800;color:var(--t3);letter-spacing:2px;">VS</div>
         <div style="font-size:11px;color:var(--t3);font-weight:600;">${fmtTime(m.match_date)} CLT</div>
       </div>`;

  /* ── Prediction area ── */
  let predArea = `<div class="divider"></div>`;

  if (m.is_finished) {
    predArea += `<div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
      <span style="font-size:11px;color:var(--t3);font-weight:700;text-transform:uppercase;letter-spacing:0.5px;">Tu apuesta:</span>
      ${hasPred
        ? `<span style="font-family:var(--mono);font-size:14px;font-weight:700;color:var(--t2);">${pred.pred_home}:${pred.pred_away}</span>`
        : `<span style="font-size:12px;color:var(--t3);">No apostaste</span>`}
      ${predBadge}
    </div>`;
  } else if (lock.locked) {
    predArea += `<div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
      <span style="font-size:11px;color:var(--t3);">🔒 Apuestas cerradas</span>
      ${hasPred
        ? `<span style="font-family:var(--mono);font-size:13px;font-weight:700;color:var(--t3);">${pred.pred_home}:${pred.pred_away}</span><span class="badge badge-saved">✓ Guardada</span>`
        : `<span style="font-size:11px;color:var(--t3);font-style:italic;">Sin apuesta</span>`}
    </div>`;
  } else {
    predArea += `<div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
      <span style="font-size:11px;color:var(--t3);font-weight:700;text-transform:uppercase;letter-spacing:0.5px;flex-shrink:0;">Apuesta:</span>
      <div style="display:flex;align-items:center;gap:8px;">
        <input type="number" min="0" max="20" class="score-box" id="ph-${m.id}"
          value="${hasPred ? pred.pred_home : ''}" placeholder="–"
          onkeydown="if(event.key==='Enter') savePred('${m.id}')" />
        <span style="font-size:18px;color:var(--bd);font-weight:700;">:</span>
        <input type="number" min="0" max="20" class="score-box" id="pa-${m.id}"
          value="${hasPred ? pred.pred_away : ''}" placeholder="–"
          onkeydown="if(event.key==='Enter') savePred('${m.id}')" />
      </div>
      <button class="btn btn-primary btn-sm" id="btn-${m.id}" onclick="savePred('${m.id}')">
        ${hasPred ? 'Actualizar' : 'Apostar'}
      </button>
      ${predBadge}
    </div>`;
  }

  return `<div class="card">
    <!-- Header -->
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px;">
      <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap;">
        ${m.group_name ? `<span class="badge badge-group">${m.group_name}</span>` : ''}
        ${m.phase !== 'Fase de Grupos' ? `<span class="badge badge-group">${m.phase}</span>` : ''}
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px;">
        ${lockBadge}
        ${m.venue ? `<span style="font-size:10px;color:var(--t3);">${m.venue}</span>` : ''}
      </div>
    </div>

    <!-- Teams + Score -->
    <div style="display:flex;align-items:center;justify-content:space-between;padding:0 4px;">
      <div class="team-block">
        <div class="team-flag">${flag(m.home_team)}</div>
        <div class="team-name">${m.home_team}</div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:center;padding:0 12px;">
        ${center}
      </div>
      <div class="team-block">
        <div class="team-flag">${flag(m.away_team)}</div>
        <div class="team-name">${m.away_team}</div>
      </div>
    </div>

    ${predArea}
  </div>`;
}

async function savePred(matchId) {
  const phEl = document.getElementById(`ph-${matchId}`);
  const paEl = document.getElementById(`pa-${matchId}`);
  const btn  = document.getElementById(`btn-${matchId}`);
  if (!phEl || !paEl) return;

  const ph = parseInt(phEl.value);
  const pa = parseInt(paEl.value);
  if (isNaN(ph) || isNaN(pa) || ph < 0 || pa < 0) { toast('⚠ Ingresa un marcador válido'); return; }
  if (ph > 20 || pa > 20) { toast('⚠ Marcador demasiado alto'); return; }

  /* Double-check lock client-side */
  const m = matches.find(x => x.id === matchId);
  if (m && getLock(m).locked) { toast('🔒 Este partido ya no acepta apuestas'); return; }

  const orig = btn.textContent;
  btn.disabled = true; btn.textContent = '...';

  const { error } = await sb.from('mundial_predictions').upsert(
    { player_name: currentUser, match_id: matchId, pred_home: ph, pred_away: pa, points: 0 },
    { onConflict: 'player_name,match_id' }
  );

  btn.disabled = false; btn.textContent = orig;

  if (error) {
    /* Handle RLS lock violation */
    const isRLS = error.code === '42501' ||
      (error.message || '').toLowerCase().includes('row-level') ||
      (error.message || '').toLowerCase().includes('policy');
    toast(isRLS ? '🔒 Partido cerrado — apuestas no permitidas' : '✗ Error al guardar. Intenta de nuevo.');
    return;
  }

  toast('✓ Apuesta guardada');
  await loadUserPreds();
  await loadLeaderboard();
  renderMatches();
}

/* ── LEADERBOARD ── */
function renderLeaderboard() {
  const pane = document.getElementById('pane-leaderboard');
  if (!pane) return;

  const finished = matches.filter(m => m.is_finished).length;
  const MEDALS  = ['🥇','🥈','🥉'];
  const LDR_CLS = ['ldr-1','ldr-2','ldr-3'];
  const COLORS  = ['var(--gold)','var(--silver)','var(--bronze)'];

  let html = `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;">
    <div style="font-size:17px;font-weight:900;color:var(--tx);">Clasificación</div>
    <button class="btn btn-ghost btn-sm" onclick="refreshAll()">↻ Actualizar</button>
  </div>
  <div class="card card-sm" style="display:flex;gap:0;margin-bottom:8px;border-radius:12px;">
    <div style="flex:1;text-align:center;padding:4px 0;">
      <div style="font-size:19px;font-weight:900;font-family:var(--mono);color:var(--tx);">${matches.length}</div>
      <div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.4px;color:var(--t3);">Partidos</div>
    </div>
    <div style="width:1px;background:var(--bd);margin:4px 0;"></div>
    <div style="flex:1;text-align:center;padding:4px 0;">
      <div style="font-size:19px;font-weight:900;font-family:var(--mono);color:var(--green);">${finished}</div>
      <div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.4px;color:var(--t3);">Jugados</div>
    </div>
    <div style="width:1px;background:var(--bd);margin:4px 0;"></div>
    <div style="flex:1;text-align:center;padding:4px 0;">
      <div style="font-size:19px;font-weight:900;font-family:var(--mono);color:var(--blue);">${leaderboard.length}</div>
      <div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.4px;color:var(--t3);">Jugadores</div>
    </div>
  </div>`;

  if (leaderboard.length === 0) {
    html += `<div class="empty-state"><div class="icon">🏆</div><div class="title">Tabla vacía</div><div class="sub">Los puntos aparecen cuando terminen los partidos</div></div>`;
    pane.innerHTML = html; return;
  }

  leaderboard.forEach((p, i) => {
    const isMe = p.name === currentUser;
    const top3 = i < 3;
    const cls  = top3 ? `card ${LDR_CLS[i]}` : 'card';
    const ptColor = top3 ? COLORS[i] : 'var(--tx)';

    html += `<div class="${cls}${isMe ? ' ldr-me' : ''}" style="padding:13px 16px;">
      <div style="display:flex;align-items:center;gap:12px;">
        <div style="font-size:${top3?'22':'15'}px;width:30px;text-align:center;flex-shrink:0;font-weight:900;color:${top3?ptColor:'var(--t3)'};">
          ${top3 ? MEDALS[i] : `${i+1}`}
        </div>
        <div style="flex:1;min-width:0;">
          <div style="font-weight:800;font-size:14px;color:var(--tx);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">
            ${p.name}
            ${isMe ? `<span style="font-size:9px;background:rgba(74,144,217,0.15);color:var(--blue);border-radius:4px;padding:2px 6px;margin-left:6px;font-weight:700;">TÚ</span>` : ''}
          </div>
        </div>
        <div style="text-align:right;flex-shrink:0;">
          <div style="font-family:var(--mono);font-size:${top3?'26':'20'}px;font-weight:700;color:${ptColor};line-height:1;">${p.total}</div>
          <div style="font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:0.4px;color:var(--t3);">pts</div>
        </div>
      </div>
    </div>`;
  });

  pane.innerHTML = html;
}

async function refreshAll() {
  toast('Actualizando...');
  await loadAll();
  render();
  toast('✓ Datos actualizados');
}

function unlockAdmin() {
  if ((document.getElementById('adminPwInput').value || '') === ADMIN_PW) {
    adminUnlocked = true;
    toast('✓ Modo Admin activado');
    renderAdmin();
  } else {
    toast('✗ Contraseña incorrecta');
    document.getElementById('adminPwInput').value = '';
  }
}

async function addMatch() {
  const home  = (document.getElementById('addHome').value  || '').trim();
  const away  = (document.getElementById('addAway').value  || '').trim();
  const date  = document.getElementById('addDate').value;
  const phase = document.getElementById('addPhase').value;
  const group = (document.getElementById('addGroup').value || '').trim() || null;
  const venue = (document.getElementById('addVenue').value || '').trim() || null;

  if (!home)        { toast('⚠ Falta el equipo local'); return; }
  if (!away)        { toast('⚠ Falta el equipo visitante'); return; }
  if (!date)        { toast('⚠ Falta la fecha y hora'); return; }
  if (home === away) { toast('⚠ Los equipos deben ser distintos'); return; }

  /* date-local is CLT → convert to UTC (+4h) */
  const utcDate = new Date(new Date(date).getTime() + 4 * 3600000).toISOString();

  const { error } = await sb.from('mundial_matches').insert({
    home_team: home, away_team: away, match_date: utcDate,
    phase, group_name: group, venue, is_finished: false,
  });

  if (error) { toast('✗ Error al agregar'); return; }
  toast(`✓ ${home} vs ${away} agregado`);
  ['addHome','addAway','addDate','addGroup','addVenue'].forEach(id => { document.getElementById(id).value = ''; });
  await loadMatches();
  renderAdmin();
}

async function setResult(matchId) {
  const rh = parseInt((document.getElementById(`rh-${matchId}`) || {}).value);
  const ra = parseInt((document.getElementById(`ra-${matchId}`) || {}).value);
  if (isNaN(rh) || isNaN(ra) || rh < 0 || ra < 0) { toast('⚠ Ingresa el resultado'); return; }

  const m = matches.find(x => x.id === matchId);
  if (!confirm(`¿Guardar?\n${m?.home_team} ${rh}:${ra} ${m?.away_team}`)) return;

  toast('Calculando...');
  const { error: mErr } = await sb.from('mundial_matches')
    .update({ home_score: rh, away_score: ra, is_finished: true }).eq('id', matchId);
  if (mErr) { toast('✗ Error al guardar resultado'); return; }

  const { data: preds } = await sb.from('mundial_predictions')
    .select('id, pred_home, pred_away').eq('match_id', matchId);
  for (const p of (preds || [])) {
    await sb.from('mundial_predictions')
      .update({ points: calcPoints(p.pred_home, p.pred_away, rh, ra) }).eq('id', p.id);
  }

  toast(`✓ Resultado guardado · ${(preds||[]).length} apuestas calculadas`);
  await loadAll();
  renderAdmin();
}

async function deleteMatch(matchId) {
  const m = matches.find(x => x.id === matchId);
  if (!confirm(`¿Eliminar "${m?.home_team} vs ${m?.away_team}"?\nSe borran todas las apuestas.`)) return;
  await sb.from('mundial_matches').delete().eq('id', matchId);
  toast('✓ Partido eliminado');
  await loadAll();
  renderAdmin();
}

/* ── Boot ── */
async function bootApp() {
  document.getElementById('hdrName').textContent = currentUser;
  sb = supabase.createClient(SUPA_URL, SUPA_KEY);
  activeWeek = getDefaultWeek();
  document.getElementById('pane-matches').innerHTML = '<div class="spinner"></div>';
  try {
    await loadAll();
    render();
  } catch (e) {
    console.error(e);
    document.getElementById('pane-matches').innerHTML =
      `<div class="empty-state"><div class="icon" style="color:var(--red);">⚠</div>
       <div class="title" style="color:var(--red);">Error de conexión</div>
       <div class="sub">Verifica tu conexión y recarga la página.</div></div>`;
  }
}

document.addEventListener('DOMContentLoaded', () => {
  currentUser = localStorage.getItem('mundial_user');
  if (currentUser) {
    document.getElementById('loginModal').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    bootApp();
  } else {
    document.getElementById('loginModal').style.display = 'flex';
    document.getElementById('app').style.display = 'none';
    setTimeout(() => document.getElementById('nameInput').focus(), 100);
  }
});
</script>
