<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mundial 2026 вҡҪ Predicciones</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <style>
    /* в”Җв”Җ Design tokens (Nubox dark + World Cup gold) в”Җв”Җ */
    :root {
      --navy:    #1B2A4A;
      --navy-lt: #243556;
      --navy-md: #2D4168;
      --sf:      #0F1923;
      --s1:      #162230;
      --s2:      #1C2D3F;
      --s3:      #23374D;
      --bd:      #2A3F5A;
      --blue:    #4A90D9;
      --blue-lt: #6BA5E7;
      --green:   #34C77B;
      --gold:    #D4A853;
      --gold-lt: #F0C96A;
      --coral:   #F2735A;
      --red:     #E85454;
      --orange:  #F2A03D;
      --silver:  #9BAFC8;
      --bronze:  #C87D3A;
      --tx:      #E8EDF3;
      --t2:      #9BAFC8;
      --t3:      #6B82A0;
      --mono:    'JetBrains Mono', monospace;
      --sans:    'DM Sans', system-ui, sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--sans);
      background: var(--sf);
      color: var(--tx);
      min-height: 100vh;
      /* Subtle pitch pattern */
      background-image: radial-gradient(circle at 20% 50%, rgba(74,144,217,0.04) 0%, transparent 50%),
                        radial-gradient(circle at 80% 20%, rgba(212,168,83,0.04) 0%, transparent 40%);
    }

    /* в”Җв”Җ Scrollbar в”Җв”Җ */
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: var(--s1); }
    ::-webkit-scrollbar-thumb { background: var(--bd); border-radius: 4px; }

    /* в”Җв”Җ Tabs в”Җв”Җ */
    .tab-btn {
      padding: 14px 20px; border-bottom: 3px solid transparent;
      color: var(--t3); font-weight: 600; font-size: 13px; cursor: pointer;
      transition: all 0.2s; white-space: nowrap; background: none;
      border-top: none; border-left: none; border-right: none;
      letter-spacing: 0.2px;
    }
    .tab-btn.active { border-bottom-color: var(--blue); color: var(--blue); }
    .tab-btn:hover:not(.active) { color: var(--t2); background: rgba(255,255,255,0.03); }

    /* в”Җв”Җ Cards в”Җв”Җ */
    .card {
      background: var(--s2); border: 1px solid var(--bd);
      border-radius: 16px; padding: 20px; margin-bottom: 12px;
      transition: transform 0.15s, border-color 0.2s;
    }
    .card:hover { transform: translateY(-1px); border-color: var(--navy-md); }
    .card-sm { padding: 14px 18px; }

    /* в”Җв”Җ Score inputs в”Җв”Җ */
    .score-box {
      width: 56px; height: 56px; background: var(--s3); border: 2px solid var(--bd);
      border-radius: 12px; text-align: center; font-size: 22px; font-weight: 700;
      font-family: var(--mono); color: var(--tx);
      transition: border-color 0.2s, box-shadow 0.2s; -moz-appearance: textfield;
    }
    .score-box::-webkit-inner-spin-button, .score-box::-webkit-outer-spin-button { -webkit-appearance: none; }
    .score-box:focus { outline: none; border-color: var(--blue); box-shadow: 0 0 0 3px rgba(74,144,217,0.2); }
    .score-box:disabled { opacity: 0.4; cursor: not-allowed; }
    .score-box::placeholder { color: var(--t3); font-size: 16px; }

    /* в”Җв”Җ Buttons в”Җв”Җ */
    .btn { border: none; border-radius: 10px; font-family: var(--sans); font-weight: 600; cursor: pointer; transition: all 0.18s; font-size: 13px; }
    .btn-primary { background: var(--blue); color: white; padding: 10px 20px; }
    .btn-primary:hover:not(:disabled) { background: var(--blue-lt); transform: translateY(-1px); }
    .btn-primary:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }
    .btn-sm { padding: 8px 14px; font-size: 12px; border-radius: 8px; }
    .btn-ghost { background: var(--s3); color: var(--t2); padding: 8px 16px; border: 1px solid var(--bd); }
    .btn-ghost:hover { background: var(--navy-md); color: var(--tx); }
    .btn-danger { background: rgba(232,84,84,0.12); color: var(--red); padding: 7px 12px; border: 1px solid rgba(232,84,84,0.25); border-radius: 8px; font-size: 12px; font-weight: 600; cursor: pointer; transition: all 0.18s; font-family: var(--sans); }
    .btn-danger:hover { background: rgba(232,84,84,0.22); }

    /* в”Җв”Җ Badges в”Җв”Җ */
    .badge { display: inline-flex; align-items: center; gap: 5px; border-radius: 6px; padding: 4px 10px; font-size: 12px; font-weight: 700; letter-spacing: 0.1px; }
    .badge-exact  { background: rgba(212,168,83,0.15); color: var(--gold-lt); border: 1px solid rgba(212,168,83,0.3); }
    .badge-win    { background: rgba(52,199,123,0.12); color: var(--green); border: 1px solid rgba(52,199,123,0.25); }
    .badge-miss   { background: rgba(232,84,84,0.1);  color: var(--red);   border: 1px solid rgba(232,84,84,0.2); }
    .badge-none   { background: var(--s3); color: var(--t3); border: 1px solid var(--bd); }
    .badge-saved  { background: rgba(52,199,123,0.1);  color: var(--green); border: 1px solid rgba(52,199,123,0.2); }
    .badge-phase  { background: rgba(74,144,217,0.12); color: var(--blue-lt); border: 1px solid rgba(74,144,217,0.25); font-size: 11px; }
    .badge-done   { background: rgba(52,199,123,0.08); color: var(--green); border: 1px solid rgba(52,199,123,0.15); font-size: 10px; text-transform: uppercase; letter-spacing: 0.6px; }

    /* в”Җв”Җ Phase pills в”Җв”Җ */
    .pill {
      padding: 7px 16px; border-radius: 20px; font-size: 12px; font-weight: 600;
      cursor: pointer; white-space: nowrap; border: 1px solid var(--bd);
      background: var(--s2); color: var(--t2); transition: all 0.15s; letter-spacing: 0.1px;
    }
    .pill.active { background: var(--blue); border-color: var(--blue); color: white; box-shadow: 0 0 12px rgba(74,144,217,0.3); }
    .pill:hover:not(.active) { border-color: var(--t3); color: var(--tx); }

    /* в”Җв”Җ Scrollable row в”Җв”Җ */
    .hscroll { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 4px; -webkit-overflow-scrolling: touch; }
    .hscroll::-webkit-scrollbar { display: none; }

    /* в”Җв”Җ Leaderboard rank cards в”Җв”Җ */
    .ldr-1 { background: linear-gradient(135deg, rgba(212,168,83,0.12), rgba(212,168,83,0.05)); border-color: rgba(212,168,83,0.35) !important; }
    .ldr-2 { background: linear-gradient(135deg, rgba(155,175,200,0.1),  rgba(155,175,200,0.03)); border-color: rgba(155,175,200,0.3)  !important; }
    .ldr-3 { background: linear-gradient(135deg, rgba(200,125,58,0.1),   rgba(200,125,58,0.03)); border-color: rgba(200,125,58,0.3)   !important; }
    .ldr-me { border-color: rgba(74,144,217,0.5) !important; box-shadow: 0 0 0 1px rgba(74,144,217,0.15); }

    /* в”Җв”Җ Inputs в”Җв”Җ */
    .input {
      width: 100%; background: var(--s3); border: 1px solid var(--bd);
      border-radius: 10px; padding: 11px 14px; font-size: 14px; color: var(--tx);
      font-family: var(--sans); transition: border-color 0.2s;
    }
    .input:focus { outline: none; border-color: var(--blue); box-shadow: 0 0 0 2px rgba(74,144,217,0.15); }
    .input::placeholder { color: var(--t3); }
    select.input { cursor: pointer; }
    label { display: block; font-size: 12px; font-weight: 700; color: var(--t2); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }

    /* в”Җв”Җ Modal в”Җв”Җ */
    .modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.75); display: flex; align-items: center; justify-content: center; z-index: 100; padding: 16px; backdrop-filter: blur(4px); }
    .modal-box { background: var(--s1); border: 1px solid var(--bd); border-radius: 24px; padding: 40px 32px; max-width: 420px; width: 100%; text-align: center; box-shadow: 0 40px 80px rgba(0,0,0,0.5); }

    /* в”Җв”Җ Header в”Җв”Җ */
    .app-header {
      background: linear-gradient(135deg, var(--navy) 0%, var(--sf) 100%);
      border-bottom: 1px solid var(--bd); padding: 14px 20px;
    }

    /* в”Җв”Җ Tab bar в”Җв”Җ */
    .tab-bar { background: var(--s1); border-bottom: 1px solid var(--bd); position: sticky; top: 0; z-index: 40; overflow-x: auto; }
    .tab-bar::-webkit-scrollbar { display: none; }

    /* в”Җв”Җ Spinner в”Җв”Җ */
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner { width: 32px; height: 32px; border: 3px solid var(--s3); border-top-color: var(--blue); border-radius: 50%; animation: spin 0.7s linear infinite; margin: 64px auto; }

    /* в”Җв”Җ Animations в”Җв”Җ */
    @keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .fade-in { animation: fadeUp 0.22s ease-out; }

    /* в”Җв”Җ Toast в”Җв”Җ */
    #toast {
      position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
      background: var(--navy); border: 1px solid var(--bd); color: var(--tx);
      padding: 11px 22px; border-radius: 12px; font-size: 14px; font-weight: 600;
      opacity: 0; transition: opacity 0.25s; z-index: 999; pointer-events: none;
      white-space: nowrap; box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }

    /* в”Җв”Җ Score display (finished match) в”Җв”Җ */
    .score-display {
      font-family: var(--mono); font-size: 28px; font-weight: 700; color: var(--tx);
      background: var(--s3); border: 1px solid var(--bd);
      padding: 8px 20px; border-radius: 10px; letter-spacing: 2px;
    }
    .score-sep { color: var(--t3); font-size: 18px; margin: 0 6px; }

    /* в”Җв”Җ Team block в”Җв”Җ */
    .team-block { display: flex; flex-direction: column; align-items: center; gap: 6px; flex: 1; min-width: 0; }
    .team-flag  { font-size: 32px; line-height: 1; }
    .team-name  { font-size: 12px; font-weight: 700; color: var(--t2); text-align: center; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 100px; letter-spacing: 0.2px; text-transform: uppercase; }

    /* в”Җв”Җ Dividers в”Җв”Җ */
    .divider { height: 1px; background: var(--bd); margin: 14px 0; }

    /* в”Җв”Җ Alert banner в”Җв”Җ */
    .alert-banner { background: rgba(212,168,83,0.08); border: 1px solid rgba(212,168,83,0.25); border-radius: 10px; padding: 10px 14px; margin-bottom: 12px; font-size: 13px; color: var(--gold-lt); display: flex; align-items: center; gap: 8px; }
  </style>
</head>

  'Guatemala':'рҹҮ¬рҹҮ№','El Salvador':'рҹҮёрҹҮ»','Indonesia':'рҹҮ®рҹҮ©','Nueva Zelanda':'рҹҮірҹҮҝ',
};
const flag = t => FLAGS[t] || 'рҹҸҙ';

/* в”Җв”Җ Utils в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ */
function fmtDate(dt) {
  const d = new Date(dt);
  const DAYS   = ['Dom','Lun','Mar','MiГ©','Jue','Vie','SГЎb'];
  const MONTHS = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
  const clt = new Date(d.getTime() - 4 * 60 * 60 * 1000); // CLT = UTC-4 junio
  const h = String(clt.getUTCHours()).padStart(2,'0');
  const m = String(clt.getUTCMinutes()).padStart(2,'0');
  return `${DAYS[clt.getUTCDay()]} ${clt.getUTCDate()} ${MONTHS[clt.getUTCMonth()]} В· ${h}:${m} CLT`;
}

function calcPoints(pH, pA, rH, rA) {
  if (pH === rH && pA === rA) return 3;
  if (Math.sign(pH - pA) === Math.sign(rH - rA)) return 1;
  return 0;
}

let _tt;
function toast(msg, ms = 2800) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.style.opacity = '1';
  clearTimeout(_tt);
  _tt = setTimeout(() => { el.style.opacity = '0'; }, ms);
}

function spin(id) { document.getElementById(id).innerHTML = '<div class="spinner"></div>'; }

/* в”Җв”Җ Auth в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ */
function login() {
  const name = (document.getElementById('nameInput').value || '').trim();
  if (!name || name.length < 2) { toast('вҡ  Escribe tu nombre (mГӯnimo 2 caracteres)'); return; }
  currentUser = name;
  localStorage.setItem('mundial_user', name);
  document.getElementById('loginModal').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  bootApp();
}

function logout() {
  if (!confirm('ВҝSalir? Tus apuestas quedan guardadas.')) return;
  localStorage.removeItem('mundial_user');
  location.reload();
}

/* в”Җв”Җ Data в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ */
async function loadAll() {
  await Promise.all([loadMatches(), loadUserPreds()]);
  await loadLeaderboard();
}

async function loadMatches() {
  const { data } = await sb.from('mundial_matches').select('*').order('match_date', { ascending: true });
  matches = data || [];
}

async function loadUserPreds() {
  // PRIVACY: solo cargamos las predicciones del usuario actual
  const { data } = await sb.from('mundial_predictions').select('*').eq('player_name', currentUser);
  userPreds = {};
  (data || []).forEach(p => { userPreds[p.match_id] = p; });
}

async function loadLeaderboard() {
  // PRIVACY: solo traemos nombre + puntos totales (no marcadores individuales)
  const { data } = await sb.from('mundial_predictions').select('player_name, points');
  const board = {};
  (data || []).forEach(p => {
    if (!board[p.player_name]) board[p.player_name] = { name: p.player_name, total: 0 };
    board[p.player_name].total += (p.points || 0);
  });
  leaderboard = Object.values(board).sort((a, b) => b.total - a.total);
  updateHeaderPts();
}

function updateHeaderPts() {
  const me = leaderboard.find(p => p.name === currentUser);
  const pts = me ? me.total : 0;
  document.getElementById('hdrPts').textContent = `${pts} ${pts === 1 ? 'PUNTO' : 'PUNTOS'}`;
}

/* в”Җв”Җ Navigation в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ */
function switchTab(tab) {
  activeTab = tab;
  ['matches','leaderboard','admin'].forEach(t => {
    document.getElementById(`tabBtn-${t}`).classList.toggle('active', t === tab);
    const pane = document.getElementById(`pane-${t}`);
    pane.style.display = t === tab ? 'block' : 'none';
    if (t === tab) pane.classList.add('fade-in');
  });
  render();
}

function render() {
  if (activeTab === 'matches')     renderMatches();
  if (activeTab === 'leaderboard') renderLeaderboard();
  if (activeTab === 'admin')       renderAdmin();
}

/* в”Җв”Җ MATCHES в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ */
function setPhase(p) { activePhase = p; renderMatches(); }

function renderMatches() {
  const pane = document.getElementById('pane-matches');
  if (!pane) return;

  if (matches.length === 0) {
    pane.innerHTML = `<div class="card" style="text-align:center;padding:56px 24px;">
      <div style="font-size:52px;margin-bottom:16px;">рҹҸҹпёҸ</div>
      <div style="font-weight:800;font-size:18px;color:var(--tx);margin-bottom:8px;">Sin partidos cargados</div>
      <div style="font-size:13px;color:var(--t3);">El Admin puede cargarlos en la pestaГұa вҡҷ Admin</div>
    </div>`;
    return;
  }

  const phases   = ['Todos', ...new Set(matches.map(m => m.phase))];
  const filtered = activePhase === 'Todos' ? matches : matches.filter(m => m.phase === activePhase);
  const pending  = filtered.filter(m => !m.is_finished && !userPreds[m.id]).length;

  let html = `<div class="hscroll" style="margin-bottom:16px;">
    ${phases.map(p => `<button class="pill${p === activePhase ? ' active' : ''}" onclick="setPhase('${p}')">${p}</button>`).join('')}
  </div>`;

  if (pending > 0) {
    html += `<div class="alert-banner">
      <span style="font-size:16px;">вҡЎ</span>
      <span>Tienes <strong>${pending}</strong> partido${pending > 1 ? 's' : ''} sin apostar</span>
    </div>`;
  }

  if (filtered.length === 0) {
    html += `<div class="card" style="text-align:center;padding:32px;color:var(--t3);">Sin partidos en esta fase.</div>`;
  } else {
    filtered.forEach(m => { html += buildMatchCard(m); });
  }

  pane.innerHTML = html;
}

function buildMatchCard(m) {
  const pred       = userPreds[m.id];
  const finished   = m.is_finished;
  const hasPred    = !!pred;

  // в”Җв”Җ Badge de resultado personal в”Җв”Җ
  let badge = '';
  if (finished && hasPred) {
    const p = pred.points || 0;
    if (p === 3)      badge = `<span class="badge badge-exact">рҹҘҮ Exacto +3pts</span>`;
    else if (p === 1) badge = `<span class="badge badge-win">вң“ Ganador +1pt</span>`;
    else              badge = `<span class="badge badge-miss">вң— Fallaste</span>`;
  } else if (finished && !hasPred) {
    badge = `<span class="badge badge-miss">Sin apuesta</span>`;
  } else if (!finished && hasPred) {
    badge = `<span class="badge badge-saved">вң“ Apostado</span>`;
  } else {
    badge = `<span class="badge badge-none">Sin apostar</span>`;
  }

  // в”Җв”Җ Centro: marcador real o separador в”Җв”Җ
  const center = finished
    ? `<div class="score-display">${m.home_score}<span class="score-sep">:</span>${m.away_score}</div>`
    : `<div style="font-size:10px;font-weight:800;color:var(--t3);letter-spacing:2px;">VS</div>`;

  // в”Җв”Җ ГҒrea de predicciГіn в”Җв”Җ
  let predArea = '';
  if (finished) {
    predArea = `<div class="divider"></div>
      <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
        <span style="font-size:12px;color:var(--t3);font-weight:700;text-transform:uppercase;letter-spacing:0.5px;">Tu apuesta:</span>
        ${hasPred
          ? `<span style="font-family:var(--mono);font-size:15px;font-weight:700;color:var(--t2);">${pred.pred_home}:${pred.pred_away}</span>`
          : `<span style="font-size:12px;color:var(--t3);">No apostaste</span>`
        }
        ${badge}
      </div>`;
  } else {
    predArea = `<div class="divider"></div>
      <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
        <span style="font-size:12px;color:var(--t3);font-weight:700;text-transform:uppercase;letter-spacing:0.5px;flex-shrink:0;">Tu apuesta:</span>
        <div style="display:flex;align-items:center;gap:10px;">
          <input type="number" min="0" max="20" class="score-box" id="ph-${m.id}"
            value="${hasPred ? pred.pred_home : ''}" placeholder="вҖ“"
            onkeydown="if(event.key==='Enter') savePred('${m.id}')" />
          <span style="font-size:20px;color:var(--bd);font-weight:700;">:</span>
          <input type="number" min="0" max="20" class="score-box" id="pa-${m.id}"
            value="${hasPred ? pred.pred_away : ''}" placeholder="вҖ“"
            onkeydown="if(event.key==='Enter') savePred('${m.id}')" />
        </div>
        <button class="btn btn-primary btn-sm" id="btn-${m.id}" onclick="savePred('${m.id}')">
          ${hasPred ? 'Actualizar' : 'Apostar'}
        </button>
        ${hasPred ? badge : ''}
      </div>`;
  }

  return `<div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
      <span class="badge badge-phase">${m.phase}</span>
      <div style="text-align:right;">
        <div style="font-size:11px;color:var(--t3);">${fmtDate(m.match_date)}</div>
        ${finished ? `<span class="badge badge-done" style="margin-top:4px;">Finalizado</span>` : ''}
      </div>
    </div>

    <div style="display:flex;align-items:center;justify-content:space-between;padding:0 8px;">
      <div class="team-block">
        <div class="team-flag">${flag(m.home_team)}</div>
        <div class="team-name">${m.home_team}</div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:center;padding:0 16px;">
        ${center}
      </div>
      <div class="team-block">
        <div class="team-flag">${flag(m.away_team)}</div>
        <div class="team-name">${m.away_team}</div>
      </div>
    </div>

    ${predArea}
  </div>`;
}

async function savePred(matchId) {
  const phEl = document.getElementById(`ph-${matchId}`);
  const paEl = document.getElementById(`pa-${matchId}`);
  const btn  = document.getElementById(`btn-${matchId}`);
  const ph   = parseInt(phEl.value);
  const pa   = parseInt(paEl.value);

  if (isNaN(ph) || isNaN(pa) || ph < 0 || pa < 0) { toast('вҡ  Ingresa un marcador vГЎlido'); return; }
  if (ph > 20 || pa > 20) { toast('вҡ  Marcador demasiado alto'); return; }

  const orig = btn.textContent;
  btn.disabled = true; btn.textContent = '...';

  const { error } = await sb.from('mundial_predictions').upsert(
    { player_name: currentUser, match_id: matchId, pred_home: ph, pred_away: pa, points: 0 },
    { onConflict: 'player_name,match_id' }
  );

  btn.disabled = false; btn.textContent = orig;

  if (error) { console.error(error); toast('вң— Error al guardar. Intenta de nuevo.'); return; }

  toast('вң“ Apuesta guardada');
  await loadUserPreds();
  await loadLeaderboard();
  renderMatches();
}

            <div style="font-weight:700;font-size:13px;color:var(--tx);margin-bottom:3px;">
              ${flag(m.home_team)} ${m.home_team} vs ${flag(m.away_team)} ${m.away_team}
            </div>
            <div style="font-size:11px;color:var(--t3);margin-bottom:6px;">${m.phase} В· ${fmtDate(m.match_date)}</div>
            ${status}
          </div>
          <div style="display:flex;align-items:center;gap:6px;flex-shrink:0;flex-wrap:wrap;">
            <input type="number" min="0" max="20" id="rh-${m.id}" class="score-box"
              style="width:44px;height:44px;font-size:15px;"
              value="${m.home_score !== null && m.home_score !== undefined ? m.home_score : ''}" placeholder="вҖ“" />
            <span style="color:var(--bd);font-weight:700;">:</span>
            <input type="number" min="0" max="20" id="ra-${m.id}" class="score-box"
              style="width:44px;height:44px;font-size:15px;"
              value="${m.away_score !== null && m.away_score !== undefined ? m.away_score : ''}" placeholder="вҖ“" />
            <button class="btn btn-primary btn-sm" onclick="setResult('${m.id}')">
              ${m.is_finished ? 'Corregir' : 'Guardar'}
            </button>
            <button class="btn-danger" onclick="deleteMatch('${m.id}')">вң•</button>
          </div>
        </div>
      </div>`;
    });
  }

  pane.innerHTML = html;
}

function unlockAdmin() {
  if ((document.getElementById('adminPwInput').value || '') === ADMIN_PW) {
    adminUnlocked = true;
    toast('вң“ Modo Admin activado');
    renderAdmin();
  } else {
    toast('вң— ContraseГұa incorrecta');
    document.getElementById('adminPwInput').value = '';
    document.getElementById('adminPwInput').focus();
  }
}

async function addMatch() {
  const home  = (document.getElementById('addHome').value  || '').trim();
  const away  = (document.getElementById('addAway').value  || '').trim();
  const date  = document.getElementById('addDate').value;
  const phase = document.getElementById('addPhase').value;

  if (!home)       { toast('вҡ  Falta el equipo local'); return; }
  if (!away)       { toast('вҡ  Falta el equipo visitante'); return; }
  if (!date)       { toast('вҡ  Falta la fecha y hora'); return; }
  if (home === away){ toast('вҡ  Los equipos deben ser distintos'); return; }

  const { error } = await sb.from('mundial_matches').insert({
    home_team: home, away_team: away,
    match_date: new Date(date).toISOString(),
    phase, is_finished: false,
  });

  if (error) { console.error(error); toast('вң— Error al agregar'); return; }
  toast(`вң“ Partido agregado: ${home} vs ${away}`);
  ['addHome','addAway','addDate'].forEach(id => { document.getElementById(id).value = ''; });
  await loadMatches();
  renderAdmin();
}

async function setResult(matchId) {
  const rh = parseInt((document.getElementById(`rh-${matchId}`) || {}).value);
  const ra = parseInt((document.getElementById(`ra-${matchId}`) || {}).value);
  if (isNaN(rh) || isNaN(ra) || rh < 0 || ra < 0) { toast('вҡ  Ingresa el resultado'); return; }

  const m = matches.find(x => x.id === matchId);
  if (!confirm(`ВҝGuardar resultado?\n${m ? m.home_team : ''} ${rh} : ${ra} ${m ? m.away_team : ''}\n\nSe calcularГЎn los puntos automГЎticamente.`)) return;

  toast('Calculando puntos...');

  const { error: mErr } = await sb.from('mundial_matches')
    .update({ home_score: rh, away_score: ra, is_finished: true }).eq('id', matchId);
  if (mErr) { console.error(mErr); toast('вң— Error al guardar'); return; }

  const { data: preds } = await sb.from('mundial_predictions')
    .select('id, pred_home, pred_away').eq('match_id', matchId);

  let updated = 0;
  for (const p of (preds || [])) {
    await sb.from('mundial_predictions')
      .update({ points: calcPoints(p.pred_home, p.pred_away, rh, ra) }).eq('id', p.id);
    updated++;
  }

  toast(`вң“ Resultado guardado В· ${updated} apuesta${updated !== 1 ? 's' : ''} calculada${updated !== 1 ? 's' : ''}`);
  await loadAll();
  renderAdmin();
}

async function deleteMatch(matchId) {
  const m = matches.find(x => x.id === matchId);
  if (!confirm(`ВҝEliminar "${m ? `${m.home_team} vs ${m.away_team}` : 'este partido'}"?\nSe borran tambiГ©n todas las apuestas.`)) return;
  const { error } = await sb.from('mundial_matches').delete().eq('id', matchId);
  if (error) { console.error(error); toast('вң— Error al eliminar'); return; }
  toast('вң“ Partido eliminado');
  await loadAll();
  renderAdmin();
}

/* в”Җв”Җ Boot в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ */
async function bootApp() {
  document.getElementById('hdrName').textContent = currentUser;
  sb = supabase.createClient(SUPA_URL, SUPA_KEY);
  spin('pane-matches');
  try {
    await loadAll();
    render();
  } catch (e) {
    console.error(e);
    document.getElementById('pane-matches').innerHTML = `<div class="card" style="text-align:center;padding:48px;color:var(--red);">
      <div style="font-size:36px;margin-bottom:12px;">вҡ </div>
      <div style="font-weight:700;">Error de conexiГіn</div>
      <div style="font-size:13px;color:var(--t3);margin-top:6px;">Verifica tu conexiГіn y recarga la pГЎgina.</div>
    </div>`;
  }
}

document.addEventListener('DOMContentLoaded', () => {
  currentUser = localStorage.getItem('mundial_user');
  if (currentUser) {
    document.getElementById('loginModal').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    bootApp();
  } else {
    document.getElementById('loginModal').style.display = 'flex';
    document.getElementById('app').style.display = 'none';
    setTimeout(() => document.getElementById('nameInput').focus(), 100);
  }
});
</script>
