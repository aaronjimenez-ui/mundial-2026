name: Match Reminder Notifications

on:
  schedule:
    # Cada hora — la edge function filtra si hay partido en las próximas 2h
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  remind:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Send match reminders to users without bet
        run: |
          ANON_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9rcXdnc2pob3NmY2RwdXRweGx3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUwNzI2MTcsImV4cCI6MjA5MDY0ODYxN30.pZGeFbydGY6ilUhwNX77ax5HEmed0gSBUIoNOvW1kPE"
          response=$(curl -s -o /tmp/remind.json -w "%{http_code}" \
            -X POST \
            -H "Authorization: Bearer $ANON_KEY" \
            -H "Content-Type: application/json" \
            "https://okqwgsjhosfcdputpxlw.supabase.co/functions/v1/send-match-reminder")
          echo "HTTP status: $response"
          cat /tmp/remind.json
          if [ "$response" != "200" ]; then
            echo "::warning::Reminder returned HTTP $response"
          fi
